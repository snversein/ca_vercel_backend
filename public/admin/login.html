<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxPilot Pro - Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        .login-card .logo { text-align: center; margin-bottom: 30px; }
        .login-card .logo h2 { color: #2c3e50; margin: 10px 0 5px; }
        .form-control { border-radius: 10px; padding: 12px 15px; }
        .btn-login { background: #3498db; border: none; border-radius: 10px; padding: 12px; font-weight: 600; }
        .btn-login:hover { background: #2980b9; }
        .input-group-text { border-radius: 10px 0 0 10px; background: #f8f9fa; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <i class="fas fa-file-invoice-dollar fa-3x text-primary"></i>
            <h2>TaxPilot Pro</h2>
            <span>Admin Panel</span>
        </div>
        <div id="error-message" class="alert alert-danger" style="display: none;"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" name="email" required placeholder="admin@taxpilot.com">
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" required placeholder="Enter password">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-login w-100"><i class="fas fa-sign-in-alt me-2"></i> Login</button>
        </form>
        <div class="text-center mt-4"><small class="text-muted">Default: admin@taxpilot.com / admin123</small></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const data = { email: form.email.value, password: form.password.value };
            try {
                const res = await fetch('http://localhost:5000/api/admin/web/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                const result = await res.json();
                if (res.ok) { localStorage.setItem('adminToken', result.access_token); window.location.href = 'index.html'; }
                else { document.getElementById('error-message').textContent = result.error; document.getElementById('error-message').style.display = 'block'; }
            } catch (err) { document.getElementById('error-message').textContent = 'Connection error. Please start the server.'; document.getElementById('error-message').style.display = 'block'; }
        });
    </script>
</body>
</html>
